<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Browser Android</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      height: 100%;
      width: 100%;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="screen"></canvas>

  <script src="https://copy.sh/v86/build/v86_all.js"></script>

  <script>
    const emulator = new V86({
      wasm_path: "https://copy.sh/v86/build/v86.wasm",

      memory_size: 256 * 1024 * 1024,
      vga_memory_size: 8 * 1024 * 1024,

      cdrom: {
        url: "https://github.com/TheTobster1232/browser-linux/releases/download/v1.0/linux.iso"
      },

      screen_container: document.body,
      screen_canvas: document.getElementById("screen"),

      autostart: true
    });

    function resizeCanvas() {
      const canvas = document.getElementById("screen");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
  </script>
</body>
</html>
